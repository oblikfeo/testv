# Сайт Laravel для avavpn.ru
# Скопировать: sudo cp deploy/nginx-avavpn.ru.conf /etc/nginx/sites-available/avavpn.ru
# Включить:    sudo ln -sf /etc/nginx/sites-available/avavpn.ru /etc/nginx/sites-enabled/
# Отключить дефолт, если мешает: sudo rm -f /etc/nginx/sites-enabled/default
# Проверить:   sudo nginx -t && sudo systemctl reload nginx
#
# ВАЖНО: подставьте правильный сокет PHP-FPM, например:
#   ls /var/run/php/
# Часто: php8.2-fpm.sock или php8.3-fpm.sock

server {
    listen 80;
    listen [::]:80;
    server_name avavpn.ru www.avavpn.ru;

    root /var/www/avavpn/public;
    index index.php;

    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; try_files $uri /index.php?$query_string; }
    location = /sitemap.xml { access_log off; log_not_found off; try_files $uri /index.php?$query_string; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        # Большие заголовки от Laravel (Set-Cookie, кастомные) + длинные строки в ответе подписки —
        # без этого nginx пишет «upstream sent too big header» → клиенты получают HTTP 502.
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

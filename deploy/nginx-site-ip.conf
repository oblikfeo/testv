# Laravel на новом VPS (доступ по IP, без домена)
# Установка:
#   sudo cp deploy/nginx-site-ip.conf /etc/nginx/sites-available/testv
#   sudo ln -sf /etc/nginx/sites-available/testv /etc/nginx/sites-enabled/testv
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Сокет PHP: ls /var/run/php/

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name 195.133.198.70 _;

    root /var/www/testv/public;
    index index.php;

    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; try_files $uri /index.php?$query_string; }
    location = /sitemap.xml { access_log off; log_not_found off; try_files $uri /index.php?$query_string; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

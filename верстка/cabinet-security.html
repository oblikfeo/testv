                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="new-password">Новый пароль</label>
                            <input type="password" id="new-password" placeholder="Минимум 8 символов" minlength="8">
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">Ещё раз</label>
                            <input type="password" id="confirm-password" placeholder="Повторите">
                        </div>
                    </div>
                    <div class="form-actions">

                    </div>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA VPN — Восстановление доступа</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-card">
            <a href="index.html" class="auth-logo">
                <img src="assets/logo.png" alt="AVA VPN">
                <span>AVA <em>VPN</em></span>
            </a>
            <h1>Восстановление доступа</h1>
            <p class="text-muted text-center" style="margin-bottom: 24px; font-size: 0.9rem; line-height: 1.6;">
                Введите email, на который зарегистрирован аккаунт. Мы пришлём ссылку для смены пароля.
            </p>
            <form>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="name@mail.ru" required>
                </div>
                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary">Восстановить</button>
                </div>
            </form>
            <div class="auth-links">
                <a href="login.html">Назад ко входу</a>
                <span class="separator"></span>
                <a href="index.html">Главная</a>
            </div>
        </div>
    </div>

</body>
</html>

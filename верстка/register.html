<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA VPN — Создать аккаунт</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-card">
            <a href="index.html" class="auth-logo">
                <img src="assets/logo.png" alt="AVA VPN">
                <span>AVA <em>VPN</em></span>
            </a>
            <h1>Создать аккаунт</h1>
            <form>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="name@mail.ru" required>
                </div>
                <div class="form-group">
                    <label for="password">Придумайте пароль</label>
                    <input type="password" id="password" name="password" placeholder="От 8 символов" required minlength="8">
                    <p class="form-hint">Если забудете — можно восстановить через почту.</p>
                </div>
                <label class="form-checkbox">
                    <input type="checkbox" required>
                    <span>Принимаю <a href="agreement.html">условия использования</a></span>
                </label>
                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary">Создать</button>
                </div>
            </form>
            <div class="auth-links">
                <a href="login.html">Уже есть аккаунт? Войти</a>
                <span class="separator"></span>
                <a href="index.html">Главная</a>
            </div>
        </div>
    </div>

</body>
</html>

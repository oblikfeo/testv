<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA VPN — Войти</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-card">
            <a href="index.html" class="auth-logo">
                <img src="assets/logo.png" alt="AVA VPN">
                <span>AVA <em>VPN</em></span>
            </a>
            <h1>Войти в аккаунт</h1>
            <form>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="name@mail.ru" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="Введите пароль" required>
                </div>
                <div class="form-row-between">
                    <label class="form-checkbox" style="margin-bottom: 0;">
                        <input type="checkbox">
                        <span>Не выходить</span>
                    </label>
                    <a href="forgot-password.html">Не помню пароль</a>
                </div>
                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary">Войти</button>
                </div>
            </form>
            <div class="auth-links">
                <a href="register.html">Нет аккаунта? Создать</a>
                <span class="separator"></span>
                <a href="index.html">Главная</a>
            </div>
        </div>
    </div>

</body>
</html>
